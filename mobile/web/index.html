<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#1BA8B5" />
    <title>Asistan</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        margin: 0;
        background: #f4f7fa;
        -webkit-text-size-adjust: 100%;
      }
      body {
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f4f7fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 9999;
      }
      #boot-splash.hidden {
        display: none;
      }
      .boot-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e4ebf0;
        border-top-color: #1ba8b5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .boot-text {
        color: #6b7c8f;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <noscript>Bu uygulamayı kullanmak için JavaScript'i etkinleştirin.</noscript>
    <div id="boot-splash" aria-live="polite">
      <div class="boot-spinner" aria-hidden="true"></div>
      <div class="boot-text">Asistan yükleniyor…</div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById("boot-splash");
        var root = document.getElementById("root");
        if (!splash || !root) return;
        var hide = function () {
          splash.classList.add("hidden");
        };
        var obs = new MutationObserver(function () {
          if (root.childNodes.length > 0) {
            hide();
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true, subtree: true });
        setTimeout(hide, 25000);
      })();
    </script>
  </body>
</html>
